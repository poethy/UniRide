<div style="display:flex;align-items:center;gap:14px;padding:18px 36px 0">

  <!-- Hamburger (mobile only) -->
  <button class="ur-hamburger" (click)="toggleSidebar()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 6h18M3 12h18M3 18h18"/>
    </svg>
  </button>

  <div style="display:flex;align-items:center;gap:14px;margin-left:auto">

  <!-- Bell -->
  <a routerLink="/notificaciones"
     style="width:40px;height:40px;border-radius:50%;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;text-decoration:none;color:var(--text)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 9a6 6 0 1112 0v4l2 3H4l2-3V9z"/><path d="M10 19a2 2 0 004 0"/>
    </svg>
    <span *ngIf="noLeidas > 0"
      style="position:absolute;top:7px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:1.5px solid var(--bg)"></span>
  </a>

  <!-- User pill -->
  <div style="height:40px;padding-right:14px;padding-left:6px;border-radius:999px;background:var(--bg-soft);display:flex;align-items:center;gap:10px">
    <div style="width:30px;height:30px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">
      {{ usuario?.nombre?.charAt(0)?.toUpperCase() }}{{ usuario?.apellido?.charAt(0)?.toUpperCase() }}
    </div>
    <span style="font-size:13.5px;font-weight:700;color:var(--text)">{{ usuario?.nombre }}</span>
    <button (click)="logout()" title="Cerrar sesión"
      style="background:none;border:none;cursor:pointer;display:flex;align-items:center;padding:0;color:var(--text-3)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 9l6 6 6-6"/>
      </svg>
    </button>
  </div>

  </div>

</div>
