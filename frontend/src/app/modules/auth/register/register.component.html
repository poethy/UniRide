<div class="min-h-screen bg-gradient-to-br from-primary-900 to-primary-600 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-8">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-primary-700">UniRide</h1>
      <p class="text-gray-500 mt-1 text-sm">Crea tu cuenta de estudiante</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
          <input formControlName="nombre" type="text" placeholder="Juan" class="input-field"
            [class.border-red-400]="form.get('nombre')?.invalid && form.get('nombre')?.touched">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Apellido</label>
          <input formControlName="apellido" type="text" placeholder="Pérez" class="input-field"
            [class.border-red-400]="form.get('apellido')?.invalid && form.get('apellido')?.touched">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
        <input formControlName="email" type="email" placeholder="correo@universidad.edu.co" class="input-field"
          [class.border-red-400]="form.get('email')?.invalid && form.get('email')?.touched">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input formControlName="password" type="password" placeholder="Mínimo 6 caracteres" class="input-field"
          [class.border-red-400]="form.get('password')?.invalid && form.get('password')?.touched">
        <p *ngIf="form.get('password')?.hasError('minlength') && form.get('password')?.touched"
          class="text-red-500 text-xs mt-1">Mínimo 6 caracteres</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Universidad</label>
        <input formControlName="universidad" type="text" placeholder="Ej: Universidad Nacional" class="input-field">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Código estudiantil</label>
        <input formControlName="codigo_estudiantil" type="text" placeholder="Ej: 1234567" class="input-field">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de cuenta</label>
        <select formControlName="rol_id" class="input-field">
          <option [value]="3">Pasajero</option>
          <option [value]="2">Conductor</option>
          <option [value]="1">Administrador</option>
        </select>
      </div>

      <button type="submit" [disabled]="loading" class="btn-primary w-full py-3 text-base mt-2">
        <span *ngIf="!loading">Crear cuenta</span>
        <span *ngIf="loading" class="flex items-center justify-center gap-2">
          <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          Registrando...
        </span>
      </button>

    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      ¿Ya tienes cuenta?
      <a routerLink="/auth/login" class="text-primary-600 font-medium hover:underline">Inicia sesión</a>
    </p>
  </div>
</div>
