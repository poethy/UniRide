<div class="min-h-screen bg-gradient-to-br from-primary-900 to-primary-600 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-primary-700">UniRide</h1>
      <p class="text-gray-500 mt-1 text-sm">Inicia sesión en tu cuenta</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
        <input formControlName="email" type="email" placeholder="correo@universidad.edu.co"
          class="input-field"
          [class.border-red-400]="form.get('email')?.invalid && form.get('email')?.touched">
        <p *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
          class="text-red-500 text-xs mt-1">Ingresa un email válido</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input formControlName="password" type="password" placeholder="••••••••"
          class="input-field"
          [class.border-red-400]="form.get('password')?.invalid && form.get('password')?.touched">
        <p *ngIf="form.get('password')?.invalid && form.get('password')?.touched"
          class="text-red-500 text-xs mt-1">La contraseña es requerida</p>
      </div>

      <button type="submit" [disabled]="loading" class="btn-primary w-full py-3 text-base">
        <span *ngIf="!loading">Iniciar sesión</span>
        <span *ngIf="loading" class="flex items-center justify-center gap-2">
          <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          Ingresando...
        </span>
      </button>

    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      ¿No tienes cuenta?
      <a routerLink="/auth/register" class="text-primary-600 font-medium hover:underline">Regístrate</a>
    </p>
  </div>
</div>
