<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h2 class="text-2xl font-bold text-gray-800">Rutas</h2>
    <button (click)="showForm = !showForm" class="btn-primary">+ Nueva ruta</button>
  </div>

  <div *ngIf="showForm" class="card">
    <h3 class="font-semibold text-gray-700 mb-4">Nueva ruta</h3>
    <form [formGroup]="form" (ngSubmit)="guardar()" class="grid grid-cols-2 gap-4">
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre (opcional)</label>
        <input formControlName="nombre" class="input-field" placeholder="Ej: Casa → Universidad">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Origen</label>
        <input formControlName="origen_descripcion" class="input-field" placeholder="Dirección de origen">
      </div>
      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Lat. origen</label>
          <input formControlName="origen_lat" type="number" step="any" class="input-field" placeholder="4.6097">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Lng. origen</label>
          <input formControlName="origen_lng" type="number" step="any" class="input-field" placeholder="-74.0817">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Destino</label>
        <input formControlName="destino_descripcion" class="input-field" placeholder="Dirección de destino">
      </div>
      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Lat. destino</label>
          <input formControlName="destino_lat" type="number" step="any" class="input-field">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Lng. destino</label>
          <input formControlName="destino_lng" type="number" step="any" class="input-field">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Distancia (km)</label>
        <input formControlName="distancia_km" type="number" step="0.1" class="input-field">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Duración (min)</label>
        <input formControlName="duracion_min" type="number" class="input-field">
      </div>
      <div class="col-span-2 flex gap-3">
        <button type="submit" [disabled]="form.invalid" class="btn-primary">Guardar</button>
        <button type="button" (click)="showForm = false" class="btn-secondary">Cancelar</button>
      </div>
    </form>
  </div>

  <div *ngIf="loading" class="text-center py-12 text-gray-400">Cargando rutas...</div>

  <div *ngIf="!loading && rutas.length === 0" class="card text-center py-12 text-gray-400">
    No hay rutas registradas.
  </div>

  <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div *ngFor="let ruta of rutas" class="card hover:shadow-md transition-shadow">
      <div class="flex items-start justify-between gap-2">
        <div class="flex-1 min-w-0">
          <p *ngIf="ruta.nombre" class="font-semibold text-gray-800 mb-1">{{ ruta.nombre }}</p>
          <p class="text-sm text-gray-600">
            <span class="text-green-600 font-medium">●</span> {{ ruta.origen_descripcion }}
          </p>
          <p class="text-sm text-gray-600 mt-1">
            <span class="text-red-500 font-medium">●</span> {{ ruta.destino_descripcion }}
          </p>
          <div class="flex gap-3 mt-2 text-xs text-gray-400">
            <span *ngIf="ruta.distancia_km">{{ ruta.distancia_km }} km</span>
            <span *ngIf="ruta.duracion_min">{{ ruta.duracion_min }} min</span>
          </div>
        </div>
        <button (click)="toggleFavorito(ruta)" class="shrink-0 mt-1"
          [class.text-yellow-400]="esFavorita(ruta)"
          [class.text-gray-300]="!esFavorita(ruta)">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
