<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h2 class="text-2xl font-bold text-gray-800">Calificaciones</h2>
    <button (click)="showForm = !showForm" class="btn-primary">+ Calificar</button>
  </div>

  <!-- Promedio -->
  <div class="card flex items-center gap-6">
    <div class="text-center">
      <p class="text-5xl font-bold text-yellow-400">{{ promedio | number:'1.1-1' }}</p>
      <p class="text-sm text-gray-500 mt-1">de 5.0</p>
    </div>
    <div>
      <div class="flex gap-0.5">
        <svg *ngFor="let s of estrellas(promedioRedondeado)"
          class="w-6 h-6 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
        </svg>
      </div>
      <p class="text-sm text-gray-500 mt-1">{{ total }} calificaciones recibidas</p>
    </div>
  </div>

  <!-- Formulario -->
  <div *ngIf="showForm" class="card">
    <h3 class="font-semibold text-gray-700 mb-4">Nueva calificación</h3>
    <form [formGroup]="form" (ngSubmit)="guardar()" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">ID del viaje</label>
          <input formControlName="viaje_id" type="number" class="input-field">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">ID del usuario a calificar</label>
          <input formControlName="calificado_id" type="number" class="input-field">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Puntaje (1-5)</label>
        <input formControlName="puntaje" type="number" min="1" max="5" class="input-field w-24">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Comentario (opcional)</label>
        <textarea formControlName="comentario" rows="3" class="input-field" placeholder="Describe tu experiencia..."></textarea>
      </div>
      <div class="flex gap-3">
        <button type="submit" [disabled]="form.invalid" class="btn-primary">Enviar</button>
        <button type="button" (click)="showForm = false" class="btn-secondary">Cancelar</button>
      </div>
    </form>
  </div>

  <!-- Lista reactiva -->
  <ng-container *ngIf="calificaciones$ | async as lista">
    <div *ngIf="lista.length === 0" class="card text-center py-12 text-gray-400">
      Aún no tienes calificaciones.
    </div>
    <div class="space-y-3">
      <div *ngFor="let c of lista" class="card">
        <div class="flex items-start justify-between gap-4">
          <div>
            <p class="font-medium text-gray-800">
              {{ c.calificador?.nombre }} {{ c.calificador?.apellido }}
            </p>
            <div class="flex gap-0.5 mt-1">
              <svg *ngFor="let s of estrellas(c.puntaje)" class="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
              <svg *ngFor="let s of estrellasVacias(c.puntaje)" class="w-4 h-4 text-gray-200" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
            </div>
            <p *ngIf="c.comentario" class="text-sm text-gray-600 mt-2">{{ c.comentario }}</p>
          </div>
          <p class="text-xs text-gray-400 shrink-0">{{ c.created_at | date:'dd/MM/yyyy' }}</p>
        </div>
      </div>
    </div>
  </ng-container>
</div>
