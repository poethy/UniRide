<div class="space-y-6">
  <h2 class="text-2xl font-bold text-gray-800">Calendario de Viajes</h2>

  <div class="card">
    <div class="flex gap-4 mb-4 flex-wrap">
      <span class="flex items-center gap-1.5 text-xs"><span class="w-3 h-3 rounded-full bg-yellow-400"></span>Pendiente</span>
      <span class="flex items-center gap-1.5 text-xs"><span class="w-3 h-3 rounded-full bg-blue-500"></span>Aceptado</span>
      <span class="flex items-center gap-1.5 text-xs"><span class="w-3 h-3 rounded-full bg-purple-500"></span>En curso</span>
      <span class="flex items-center gap-1.5 text-xs"><span class="w-3 h-3 rounded-full bg-green-500"></span>Finalizado</span>
      <span class="flex items-center gap-1.5 text-xs"><span class="w-3 h-3 rounded-full bg-red-500"></span>Cancelado</span>
    </div>
    <full-calendar [options]="calendarOptions"></full-calendar>
  </div>
</div>
