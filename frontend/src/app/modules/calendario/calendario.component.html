<!-- Header -->
<div style="padding:24px 36px 0;display:flex;align-items:flex-end;justify-content:space-between">
  <div>
    <div style="font-size:11px;font-weight:800;color:var(--accent);letter-spacing:.14em;text-transform:uppercase;font-family:'Plus Jakarta Sans',sans-serif">Tu agenda</div>
    <div style="font-size:56px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:.95;margin-top:10px;font-family:'Space Grotesk','Plus Jakarta Sans',sans-serif">Calendario</div>
  </div>
</div>

<!-- Legend -->
<div style="padding:20px 36px 0;display:flex;gap:18px;flex-wrap:wrap">
  <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);font-weight:600">
    <div style="width:8px;height:8px;border-radius:4px;background:var(--warning)"></div>Pendiente
  </div>
  <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);font-weight:600">
    <div style="width:8px;height:8px;border-radius:4px;background:var(--brand)"></div>Aceptado
  </div>
  <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);font-weight:600">
    <div style="width:8px;height:8px;border-radius:4px;background:#7C3AED"></div>En curso
  </div>
  <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);font-weight:600">
    <div style="width:8px;height:8px;border-radius:4px;background:var(--success)"></div>Finalizado
  </div>
  <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);font-weight:600">
    <div style="width:8px;height:8px;border-radius:4px;background:var(--danger)"></div>Cancelado
  </div>
</div>

<!-- Calendar container -->
<div style="padding:20px 36px 36px">
  <div style="border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--surface)">
    <full-calendar [options]="calendarOptions"></full-calendar>
  </div>
</div>
