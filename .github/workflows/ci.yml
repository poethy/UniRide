name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        env:
          # Prisma generate corre en postinstall pero no necesita DATABASE_URL real
          DATABASE_URL: 'postgresql://user:pass@localhost:5432/db'
      - run: npm run lint
      - run: npm test
        env:
          JWT_SECRET: 'ci_secret_for_tests_minimum_32_chars_ok'
          DATABASE_URL: 'postgresql://user:pass@localhost:5432/db'

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
